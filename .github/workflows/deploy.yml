name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/nadavrajuan/lingua-mentis-poc

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Setup dirs and copy compose file
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$SERVER_USER@$SERVER_HOST" \
            'mkdir -p ~/lingua-mentis/data/mnist ~/lingua-mentis/models'
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            "$SERVER_USER@$SERVER_HOST:~/lingua-mentis/docker-compose.yml"

      - name: Inject APP_PASSWORD
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$SERVER_USER@$SERVER_HOST" \
            "echo 'APP_PASSWORD=${APP_PASSWORD}' > ~/lingua-mentis/.env"

      - name: Pull image and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # Pipe GITHUB_TOKEN via stdin so docker login --password-stdin reads it on the server
          echo "$GITHUB_TOKEN" | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$SERVER_USER@$SERVER_HOST" \
            'docker login ghcr.io -u nadavrajuan --password-stdin &&
             cd ~/lingua-mentis &&
             docker pull ghcr.io/nadavrajuan/lingua-mentis-poc:latest &&
             docker compose up -d --force-recreate &&
             docker image prune -f &&
             docker logout ghcr.io &&
             echo "Deploy complete"'
