name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/nadavrajuan/lingua-mentis-poc
  DEPLOY_DIR: $HOME/lingua-mentis

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$SERVER_USER@$SERVER_HOST" bash -s << 'ENDSSH'
          set -e
          mkdir -p ~/lingua-mentis/data/mnist ~/lingua-mentis/models
          cd ~/lingua-mentis

          cat > docker-compose.yml << 'COMPOSE'
          services:
            lingua-mentis:
              image: ghcr.io/nadavrajuan/lingua-mentis-poc:latest
              restart: unless-stopped
              environment:
                - PYTHONUNBUFFERED=1
                - APP_PASSWORD=${APP_PASSWORD}
              volumes:
                - ./data:/app/data
                - ./models:/app/models
              networks:
                - traefik-public
              labels:
                - "traefik.enable=true"
                - "traefik.http.routers.lingua-mentis.rule=Host(`lingua-mentis.rajuan.app`)"
                - "traefik.http.routers.lingua-mentis.entrypoints=websecure"
                - "traefik.http.routers.lingua-mentis.tls.certresolver=letsencrypt"
                - "traefik.http.services.lingua-mentis.loadbalancer.server.port=8000"
          networks:
            traefik-public:
              external: true
          COMPOSE

          docker pull ghcr.io/nadavrajuan/lingua-mentis-poc:latest
          docker compose up -d --force-recreate
          docker image prune -f
          echo "Deploy complete"
          ENDSSH

      - name: Inject APP_PASSWORD into .env on server
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$SERVER_USER@$SERVER_HOST" \
            "echo 'APP_PASSWORD=$APP_PASSWORD' > ~/lingua-mentis/.env && \
             cd ~/lingua-mentis && docker compose up -d --force-recreate"
